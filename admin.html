<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Schneiders Taverne & Bar</title>

<link rel="stylesheet" href="css/admin.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="topbar">

    <h1>🍺 Schneiders Admin</h1>

    <button id="logout">Abmelden</button>

</header>

<main class="container">

<section class="stats">

<div class="card">

<h2 id="itemCount">0</h2>

<p>Produkte</p>

</div>

<div class="card">

<h2 id="categoryCount">0</h2>

<p>Kategorien</p>

</div>

</section>

<section class="editor">

<h2>➕ Produkt hinzufügen</h2>

<input
type="text"
id="productName"
placeholder="Produktname">

<input
type="number"
step="0.01"
id="productPrice"
placeholder="Preis">

<input
type="text"
id="productSize"
placeholder="Menge (optional, z.B. 0,3l oder 0,5l)">

<select id="productCategory">

<option>🥤 Alkoholfreie Getränke</option>

<option>🍹 Spaßgetränke</option>

<option>🍺 Bier</option>

<option>🍸 Cocktails</option>

<option>🥃 Spirituosen</option>

<option>🍷 Wein</option>

<option>🍔 Warme Speisen</option>

<option>🍟 Snacks</option>

<option>🍰 Desserts</option>

</select>

<button id="saveProduct">

💾 Produkt speichern

</button>

</section>

    <section class="products">

    <div class="products-header">

        <h2>📋 Produkte verwalten</h2>

        <input
            type="text"
            id="searchProduct"
            placeholder="🔍 Produkt suchen...">

    </div>

    <!-- Hier werden später automatisch alle Kategorien eingefügt -->
    <div id="productsContainer">

        <p class="loading">
            Produkte werden geladen...
        </p>

    </div>

</section>

</main>

<footer>

    © 2026 Schneiders Taverne & Bar – Admin Dashboard

</footer>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/admin.js"></script>

</body>
</html>
