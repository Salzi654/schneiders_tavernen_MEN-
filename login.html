<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | Schneiders Taverne</title>

<link rel="stylesheet" href="css/login.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap"
rel="stylesheet">

</head>


<body>


<div class="login-container">


    <div class="login-box">


        <div class="login-logo">

            🍺

        </div>


        <h1>

            Admin Login

        </h1>


        <p>

            Schneiders Taverne & Bar

        </p>



        <form id="loginForm">


            <div class="input-group">


                <label>

                    Benutzername

                </label>


                <input 
                type="text"
                id="username"
                placeholder="Benutzername"
                required>


            </div>



            <div class="input-group">


                <label>

                    Passwort

                </label>


                <input 
                type="password"
                id="password"
                placeholder="Passwort"
                required>


            </div>



            <button type="submit">


                Anmelden


            </button>



            <p id="loginMessage"></p>


        </form>



        <a href="index.html" class="back">


            ← Zurück zur Website


        </a>


    </div>


</div>



<script src="js/auth.js"></script>


</body>

</html>
